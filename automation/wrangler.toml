name = "kivv-automation"
main = "src/index.ts"
compatibility_date = "2024-11-30"
compatibility_flags = ["nodejs_compat"]

# Workers configuration
workers_dev = true

# Cron triggers
# - 6 AM UTC: Paper processing (fetch, summarize, store)
# - 6 PM UTC: Daily digest notification (independent of processing state)
[triggers]
crons = ["0 6 * * *", "0 18 * * *"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "kivv-db"
database_id = "3d4fadc3-c3c9-4413-8a89-7535ce49f930"

# R2 Storage binding (for future PDF storage)
[[r2_buckets]]
binding = "PAPERS"
bucket_name = "kivv-papers"

# KV namespace binding (for checkpoints)
[[kv_namespaces]]
binding = "CACHE"
id = "e03d30ec1e414059990439d680411782"

# Environment variables
[vars]
ENVIRONMENT = "production"
NTFY_TOPIC = "kivv-papers"

# Secrets (set via: wrangler secret put CLAUDE_API_KEY)
# CLAUDE_API_KEY - Set via wrangler secret put
# CRON_SECRET - Optional manual trigger secret (set via wrangler secret put)
