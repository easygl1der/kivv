name = "kivv-mcp"
main = "src/index.ts"
compatibility_date = "2024-11-30"
compatibility_flags = ["nodejs_compat"]

# Workers configuration
workers_dev = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "kivv-db"
database_id = "3d4fadc3-c3c9-4413-8a89-7535ce49f930"

# KV Namespace binding
[[kv_namespaces]]
binding = "CACHE"
id = "e03d30ec1e414059990439d680411782"

# R2 Bucket binding
[[r2_buckets]]
binding = "PAPERS"
bucket_name = "kivv-papers"

# Environment variables
[vars]
# Non-sensitive variables only
ENVIRONMENT = "production"

# Secrets (set via: wrangler secret put CLAUDE_API_KEY)
# CLAUDE_API_KEY (use wrangler secret put)
# These are set via GitHub secrets in production
